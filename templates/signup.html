<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Portfolio Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f1116; color: #e8ecf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; font-family: 'Inter', system-ui, sans-serif; }
        .auth-card { background: #171b23; border: 1px solid #2a3040; border-top: 3px solid #2563eb; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 520px; }
        .form-control, .form-select { background: #0f1116; border-color: #2a3040; color: #e8ecf3; }
        .form-control:focus { background: #0f1116; border-color: #2563eb; color: #e8ecf3; box-shadow: 0 0 0 2px rgba(37,99,235,0.25); }
        .form-label { color: #8a93a5; font-size: 0.85rem; }
        .stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; max-height: 220px; overflow-y: auto; padding: 10px; background: #0f1116; border: 1px solid #2a3040; border-radius: 8px; }
        .stock-chip { background: #1e2535; border: 1px solid #2a3040; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 0.8rem; text-align: center; transition: all 0.15s; user-select: none; }
        .stock-chip:hover { border-color: #2563eb; }
        .stock-chip.selected { background: #1e3a5f; border-color: #2563eb; color: #60a5fa; }
        #errorMsg { display: none; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #0f1116; } ::-webkit-scrollbar-thumb { background: #2a3040; border-radius: 2px; }
    </style>
</head>
<body>
<div class="auth-card">
    <h3 class="mb-1 fw-semibold">Create account</h3>
    <p class="text-secondary mb-4" style="font-size:0.9rem">Portfolio Manager Agent</p>
    <div id="errorMsg" class="alert alert-danger py-2 mb-3"></div>
    <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Choose a username">
    </div>
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="At least 6 characters">
    </div>
    <div class="mb-3">
        <label class="form-label d-flex justify-content-between">
            <span>Select stocks for your portfolio</span>
            <span id="selectedCount" class="text-primary">0 selected</span>
        </label>
        <input type="text" class="form-control mb-2" id="stockSearch" placeholder="Search ticker...">
        <div class="stock-grid" id="stockGrid"></div>
    </div>
    <button class="btn btn-primary w-100 mb-3 mt-2" id="signupBtn">Create Account</button>
    <p class="text-center text-secondary mb-0" style="font-size:0.9rem">
        Already have an account? <a href="/login" class="text-primary">Login</a>
    </p>
</div>
<script>
const STOCKS = ["AAPL","MSFT","GOOGL","AMZN","TSLA","META","NVDA","NFLX","AMD","INTC","JPM","BAC","GS","MS","WFC","V","MA","PYPL","SQ","COIN","JNJ","PFE","MRK","ABBV","UNH","CVS","AMGN","GILD","BMY","LLY","XOM","CVX","COP","BP","SLB","NEE","DUK","SO","AEP","D","WMT","TGT","COST","HD","LOW","MCD","SBUX","NKE","DIS","IBM"];
const selected = new Set();
function renderGrid(filter = "") {
    const grid = document.getElementById("stockGrid");
    grid.innerHTML = "";
    STOCKS.filter(s => s.includes(filter.toUpperCase())).forEach(s => {
        const chip = document.createElement("div");
        chip.className = "stock-chip" + (selected.has(s) ? " selected" : "");
        chip.textContent = s;
        chip.onclick = () => {
            if (selected.has(s)) selected.delete(s);
            else selected.add(s);
            document.getElementById("selectedCount").textContent = selected.size + " selected";
            renderGrid(document.getElementById("stockSearch").value);
        };
        grid.appendChild(chip);
    });
}
document.getElementById("stockSearch").addEventListener("input", e => renderGrid(e.target.value));
renderGrid();
document.getElementById("signupBtn").addEventListener("click", async () => {
    const btn = document.getElementById("signupBtn");
    const err = document.getElementById("errorMsg");
    err.style.display = 'none';
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    if (!username || !password) { err.textContent = "Username and password are required"; err.style.display = "block"; return; }
    if (selected.size === 0) { err.textContent = "Select at least one stock"; err.style.display = "block"; return; }
    btn.disabled = true; btn.textContent = "Creating account...";
    try {
        const res = await fetch("/api/auth/signup", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ username, password, tickers: [...selected] })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Signup failed");
        window.location.href = data.redirect;
    } catch(e) {
        err.textContent = e.message; err.style.display = "block";
        btn.disabled = false; btn.textContent = "Create Account";
    }
});
</script>
</body>
</html>
