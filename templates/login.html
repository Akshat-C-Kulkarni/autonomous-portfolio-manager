<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Portfolio Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f1116; color: #e8ecf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', system-ui, sans-serif; }
        .auth-card { background: #171b23; border: 1px solid #2a3040; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; border-top: 3px solid #2563eb; }
        .form-control { background: #0f1116; border-color: #2a3040; color: #e8ecf3; }
        .form-control:focus { background: #0f1116; border-color: #2563eb; color: #e8ecf3; box-shadow: 0 0 0 2px rgba(37,99,235,0.25); }
        .form-label { color: #8a93a5; font-size: 0.85rem; }
        #errorMsg { display: none; }
    </style>
</head>
<body>
<div class="auth-card">
    <h3 class="mb-1 fw-semibold">Welcome back</h3>
    <p class="text-secondary mb-4" style="font-size:0.9rem">Portfolio Manager Agent</p>
    <div id="errorMsg" class="alert alert-danger py-2 mb-3"></div>
    <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Enter username">
    </div>
    <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter password">
    </div>
    <button class="btn btn-primary w-100 mb-3" id="loginBtn">Login</button>
    <p class="text-center text-secondary mb-0" style="font-size:0.9rem">
        Don't have an account? <a href="/signup" class="text-primary">Sign up</a>
    </p>
</div>
<script>
document.getElementById('loginBtn').addEventListener('click', async () => {
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Logging in...';
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        window.location.href = data.redirect;
    } catch(e) {
        err.textContent = e.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login';
    }
});
document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
</script>
</body>
</html>
